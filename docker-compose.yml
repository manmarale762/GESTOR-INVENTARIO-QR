services:
  # --- BASE DE DATOS DE TU APP (MySQL) ---
  db-app:
    image: mysql:8.0
    container_name: mysql-app
    environment:
      MYSQL_DATABASE: inventario_db
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-app-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 5s
    networks:
      - app-network

  # --- ODOO BASE DE DATOS (Postgres) ---
  db-odoo:
    image: postgres:15
    container_name: postgres-odoo
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo_password
    volumes:
      - postgres-odoo-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      timeout: 20s
      retries: 10
      interval: 5s
    networks:
      - app-network

  # --- ODOO ERP ---
  odoo:
    image: odoo:17.0
    container_name: odoo-erp
    depends_on:
      db-odoo:
        condition: service_healthy
    environment:
      HOST: db-odoo
      USER: odoo
      PASSWORD: odoo_password
      DB_FILTER: "^postgres$"
    ports:
      - "8069:8069"
    volumes:
      - odoo-data:/var/lib/odoo
    networks:
      - app-network

  # --- BACKEND (Java) ---
  backend:
    build: ./backend/backend
    container_name: java-backend
    ports:
      - "8080:8080"
    depends_on:
      db-app:
        condition: service_healthy
      db-odoo:
        condition: service_healthy
      odoo:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-app:3306/inventario_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root_password
      ODOO_URL: http://odoo:8069
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000,http://10.0.2.2:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/test/verify?odooId=1&code=000000"]
      timeout: 10s
      retries: 10
      interval: 5s
    networks:
      - app-network

  # --- FRONTEND (React Native Expo Web) ---
  frontend:
    build: ./frontend
    container_name: react-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://backend:8080/api
    networks:
      - app-network
    restart: unless-stopped

volumes:
  mysql-app-data:
  postgres-odoo-data:
  odoo-data:

networks:
  app-network:
    driver: bridge