# Configuraciˇn corregida para conectar con el contenedor
spring.datasource.url=jdbc:mysql://localhost:3306/inventario_db
spring.datasource.username=app_user
spring.datasource.password=app_password_segura


spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Hibernate configurado para no borrar datos y usar el dialecto correcto
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect