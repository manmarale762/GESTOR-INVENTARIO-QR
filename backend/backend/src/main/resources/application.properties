# 1. Configuración de la Base de Datos (MySQL en Docker)
# Nota: Usamos 'localhost' para que funcione desde IntelliJ. 
# Si corrieras el jar dentro de Docker, usarías 'db-app'.
spring.datasource.url=jdbc:mysql://localhost:3306/inventario_db?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Evita el molesto mensaje de 'open-in-view'
spring.jpa.open-in-view=false

# 3. Configuración de Odoo (XML-RPC)
# URL para acceder desde tu PC a Odoo
odoo.url=http://localhost:8069
# El nombre de la base de datos que crees en la pantalla de inicio de Odoo
odoo.db=postgres

# 4. Ajustes de Seguridad y Log
# Desactiva la contraseńa generada por defecto en consola
spring.main.banner-mode=off
logging.level.org.springframework.security=INFO