# 1. Configuracion de la Base de Datos (MySQL en Docker)
# Nota: Usamos 'db-app' porque dentro de Docker los contenedores se ven por nombre de servicio
spring.datasource.url=jdbc:mysql://db-app:3306/inventario_db?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Configuracion de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# 3. Configuracion de Odoo (XML-RPC)
odoo.url=http://odoo:8069
odoo.db=postgres

# 4. Ajustes de Seguridad y Log
spring.main.banner-mode=off
logging.level.org.springframework.security=INFO